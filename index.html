<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maryna — Data Analyst</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0D1B2A;
      --surface:  #132236;
      --border:   #1E3352;
      --accent:   #4FC3F7;
      --accent2:  #81D4FA;
      --text:     #E8F4FD;
      --muted:    #7A9BBF;
      --glow:     rgba(79, 195, 247, 0.18);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    body {
      padding: 48px 20px;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.35;
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px 40px;
      text-align: center;
      box-shadow: 0 8px 48px rgba(0,0,0,0.45);
    }

    /* Accent glow at top */
    .card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
    }

    /* Avatar */
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1E3352 0%, #0D2A45 100%);
      border: 2px solid var(--border);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -1px;
      box-shadow: 0 0 0 4px rgba(79,195,247,0.08);
    }

    .name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .title {
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }

    .bio {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s;
      cursor: pointer;
    }

    .link-btn:hover {
      border-color: var(--accent);
      background: var(--glow);
      box-shadow: 0 0 18px var(--glow);
      transform: translateY(-2px);
    }

    .link-btn:active {
      transform: translateY(0);
    }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 20px;
      height: 20px;
    }

    .link-text {
      flex: 1;
      text-align: left;
    }

    .link-label {
      display: block;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    .link-sub {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
    }

    .link-arrow {
      color: var(--muted);
      font-size: 18px;
      transition: color 0.2s, transform 0.2s;
    }

    .link-btn:hover .link-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    /* Icon backgrounds */
    .icon-linkedin  { background: rgba(10, 102, 194, 0.25); }
    .icon-telegram  { background: rgba(41, 182, 246, 0.20); }
    .icon-tableau   { background: rgba(232, 102, 34, 0.20); }
    .icon-github    { background: rgba(200, 200, 200, 0.12); }
    .icon-resume    { background: rgba(79, 195, 247, 0.15); }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: var(--border);
      letter-spacing: 0.5px;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; }
      .name { font-size: 22px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .link-btn { transition: none; }
    }
  </style>
</head>
